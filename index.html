<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 24px;
      color: white;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.8;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      padding: 10px 18px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #5a6fd6;
    }

    .input-area button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .filters {
      display: flex;
      padding: 12px 24px;
      gap: 8px;
      border-bottom: 1px solid #eee;
    }

    .filters button {
      padding: 6px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filters button.active {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }

    .todo-list {
      list-style: none;
      min-height: 60px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid #f5f5f5;
      gap: 12px;
      transition: background 0.15s;
    }

    .todo-item:hover {
      background: #fafafa;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item span {
      flex: 1;
      font-size: 15px;
      color: #333;
      transition: all 0.2s;
    }

    .todo-item.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .todo-item .delete-btn:hover {
      color: #e53e3e;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 24px;
      font-size: 15px;
    }

    .loading {
      text-align: center;
      color: #667eea;
      padding: 40px 24px;
      font-size: 15px;
    }

    .error-msg {
      text-align: center;
      color: #e53e3e;
      padding: 12px 24px;
      font-size: 13px;
      background: #fff5f5;
    }

    .footer {
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #888;
      border-top: 1px solid #eee;
    }

    .footer button {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .footer button:hover {
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Yapılacaklar</h1>
      <p id="date"></p>
    </div>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="Yeni görev ekle..." maxlength="100">
      <button id="add-btn" title="Ekle">+</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">Tümü</button>
      <button data-filter="active">Bekleyen</button>
      <button data-filter="done">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div class="footer">
      <span id="count"></span>
      <button id="clear-btn">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wkxkfjyrdojtzqcvhrcp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndreGtmanlyZG9qdHpxY3ZocmNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkxNDQsImV4cCI6MjA5MjI4NTE0NH0.y2iiCbL3vDhuUbXX8HTeNMYcO4DDVI4lkS9w5B0MW4Y';

    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Prefer': 'return=representation'
    };

    async function api(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
        ...options,
        headers: { ...headers, ...options.headers }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'İstek başarısız');
      }
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    let todos = [];
    let filter = 'all';

    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');
    const countEl = document.getElementById('count');
    const addBtn = document.getElementById('add-btn');

    document.getElementById('date').textContent = new Date().toLocaleDateString('tr-TR', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    function showError(msg) {
      const existing = document.querySelector('.error-msg');
      if (existing) existing.remove();
      const div = document.createElement('div');
      div.className = 'error-msg';
      div.textContent = msg;
      list.before(div);
      setTimeout(() => div.remove(), 4000);
    }

    function render() {
      const filtered = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      list.innerHTML = '';

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">Görev yok</li>';
      } else {
        filtered.forEach(todo => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (todo.done ? ' done' : '');
          const safeText = todo.text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
          li.innerHTML = `
            <input type="checkbox" ${todo.done ? 'checked' : ''} data-id="${todo.id}">
            <span>${safeText}</span>
            <button class="delete-btn" data-id="${todo.id}" title="Sil">&#10005;</button>
          `;
          list.appendChild(li);
        });
      }

      const remaining = todos.filter(t => !t.done).length;
      countEl.textContent = `${remaining} görev bekliyor`;
    }

    async function loadTodos() {
      list.innerHTML = '<li class="loading">Yükleniyor...</li>';
      try {
        todos = await api('/todos?order=created_at.desc');
        render();
      } catch (e) {
        showError('Veriler yüklenemedi: ' + e.message);
        list.innerHTML = '<li class="empty">Görev yok</li>';
      }
    }

    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      addBtn.disabled = true;
      try {
        const [created] = await api('/todos', {
          method: 'POST',
          body: JSON.stringify({ text, done: false })
        });
        todos.unshift(created);
        input.value = '';
        render();
      } catch (e) {
        showError('Görev eklenemedi: ' + e.message);
      } finally {
        addBtn.disabled = false;
      }
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    list.addEventListener('change', async e => {
      if (e.target.type === 'checkbox') {
        const id = Number(e.target.dataset.id);
        const todo = todos.find(t => t.id === id);
        if (!todo) return;
        const newDone = e.target.checked;
        try {
          await api(`/todos?id=eq.${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ done: newDone })
          });
          todo.done = newDone;
          render();
        } catch (e) {
          showError('Güncellenemedi: ' + e.message);
          e.target.checked = todo.done;
        }
      }
    });

    list.addEventListener('click', async e => {
      if (e.target.classList.contains('delete-btn')) {
        const id = Number(e.target.dataset.id);
        try {
          await api(`/todos?id=eq.${id}`, { method: 'DELETE' });
          todos = todos.filter(t => t.id !== id);
          render();
        } catch (err) {
          showError('Silinemedi: ' + err.message);
        }
      }
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('clear-btn').addEventListener('click', async () => {
      const doneIds = todos.filter(t => t.done).map(t => t.id);
      if (doneIds.length === 0) return;
      try {
        await api(`/todos?done=eq.true`, { method: 'DELETE' });
        todos = todos.filter(t => !t.done);
        render();
      } catch (e) {
        showError('Silinemedi: ' + e.message);
      }
    });

    loadTodos();
  </script>
</body>
</html>
